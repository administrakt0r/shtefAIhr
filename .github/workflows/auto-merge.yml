name: Auto Merge PR

on:
  workflow_run:
    workflows:
      - PR Checks
    types:
      - completed

permissions:
  actions: write
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Merge eligible pull request
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          set -euo pipefail

          pr_number="$(gh api "repos/$REPO/actions/runs/$RUN_ID" --jq '.pull_requests[0].number // empty')"

          if [ -z "$pr_number" ]; then
            echo "No pull request is associated with this workflow run."
            exit 0
          fi

          pr_json="$(gh pr view "$pr_number" --repo "$REPO" --json state,baseRefName,isDraft,mergeStateStatus)"

          state="$(printf '%s' "$pr_json" | jq -r '.state')"
          base_ref="$(printf '%s' "$pr_json" | jq -r '.baseRefName')"
          is_draft="$(printf '%s' "$pr_json" | jq -r '.isDraft')"
          merge_state="$(printf '%s' "$pr_json" | jq -r '.mergeStateStatus')"

          if [ "$state" != "OPEN" ]; then
            echo "Pull request #$pr_number is not open."
            exit 0
          fi

          if [ "$base_ref" != "main" ]; then
            echo "Pull request #$pr_number does not target main."
            exit 0
          fi

          if [ "$is_draft" != "false" ]; then
            echo "Pull request #$pr_number is still a draft."
            exit 0
          fi

          case "$merge_state" in
            CLEAN|HAS_HOOKS|UNSTABLE)
              ;;
            *)
              echo "Pull request #$pr_number is not mergeable right now (state: $merge_state)."
              exit 0
              ;;
          esac

          gh pr merge "$pr_number" --repo "$REPO" --squash --delete-branch
          gh workflow run deploy-pages.yml --repo "$REPO" --ref main
